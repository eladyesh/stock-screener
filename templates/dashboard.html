<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Intelligence Terminal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --bg: #070b14;
    --panel: #111827;
    --text: #e5e7eb;
    --muted: #94a3b8;

    --green: #22c55e;
    --red: #ef4444;
    --yellow: #fbbf24;
}

body {
    background: var(--bg);
    color: var(--text);
}

/* NAV */
.navbar {
    background: var(--panel);
    border-bottom: 1px solid rgba(148,163,184,0.15);
}

/* CARDS */
.card {
    background: var(--panel);
    border: 1px solid rgba(148,163,184,0.12);
    border-radius: 14px;
}

/* METRICS */
.metric {
    font-size: 1.4rem;
    font-weight: 600;
}

/* BADGES */
.badge {
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 0.75rem;
}

.buy { background: rgba(34,197,94,0.15); color: var(--green); }
.sell { background: rgba(239,68,68,0.15); color: var(--red); }
.hold { background: rgba(251,191,36,0.12); color: var(--yellow); }

/* TICKER CARD */
.ticker-card {
    transition: 0.2s;
}

.ticker-card:hover {
    transform: translateY(-3px);
}

/* FLASH ANIMATION */
.flash-buy {
    animation: flashGreen 1s ease;
}

.flash-sell {
    animation: flashRed 1s ease;
}

@keyframes flashGreen {
    0% { background: rgba(34,197,94,0.4); }
    100% { background: transparent; }
}

@keyframes flashRed {
    0% { background: rgba(239,68,68,0.4); }
    100% { background: transparent; }
}

/* HEATMAP */
.heatmap {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.heatbox {
    width: 90px;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-size: 0.8rem;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">📊 Trading Intelligence Terminal</span>
    <span class="text-secondary">Live System</span>
</nav>

<div class="container mt-4">

<!-- SENTIMENT GAUGE -->
<div class="card p-3 mb-3">
    <h6>Market Sentiment</h6>
    <div id="sentimentText" class="metric">Loading...</div>
</div>

<!-- HEATMAP -->
<div class="card p-3 mb-3">
    <h6>Heatmap</h6>
    <div class="heatmap" id="heatmap"></div>
</div>

<!-- TICKERS GRID -->
<div class="row" id="grid"></div>

</div>

<script>

let lastSignals = {};

function badgeClass(signal) {
    if (signal === "BUY") return "buy";
    if (signal === "SELL") return "sell";
    return "hold";
}

function flashClass(oldSignal, newSignal) {
    if (!oldSignal) return "";
    if (oldSignal !== newSignal) {
        if (newSignal === "BUY") return "flash-buy";
        if (newSignal === "SELL") return "flash-sell";
    }
    return "";
}

async function load() {
    const res = await fetch("/signals");
    const data = await res.json();

    const grid = document.getElementById("grid");
    const heatmap = document.getElementById("heatmap");

    grid.innerHTML = "";
    heatmap.innerHTML = "";

    let buy = 0, sell = 0, hold = 0;

    for (let t in data) {
        const d = data[t];

        // sentiment counter
        if (d.signal === "BUY") buy++;
        else if (d.signal === "SELL") sell++;
        else hold++;

        // GRID CARD
        const flash = flashClass(lastSignals[t], d.signal);

        grid.innerHTML += `
        <div class="col-md-3 mb-3">
            <div class="card p-3 ticker-card ${flash}">
                <h5>${t}</h5>
                <span class="badge ${badgeClass(d.signal)}">${d.signal}</span>
                <div class="mt-2">Score: ${d.score.toFixed(2)}</div>
                <div>Conf: ${d.confidence.toFixed(2)}</div>
            </div>
        </div>
        `;

        // HEATMAP BOX
        heatmap.innerHTML += `
            <div class="heatbox ${badgeClass(d.signal)}">
                <b>${t}</b><br>
                ${d.signal}
            </div>
        `;

        // ALERT POPUP
        if (lastSignals[t] && lastSignals[t] !== d.signal) {
            if (d.signal === "BUY") alert("🚀 BUY SIGNAL: " + t);
            if (d.signal === "SELL") alert("⚠ SELL SIGNAL: " + t);
        }

        lastSignals[t] = d.signal;
    }

    // sentiment gauge
    document.getElementById("sentimentText").innerText =
        `BUY: ${buy} | SELL: ${sell} | HOLD: ${hold}`;
}

load();
setInterval(load, 10000);

</script>

</body>
</html>
