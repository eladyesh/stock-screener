<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Intelligence Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0b1220;
            color: #e6e6e6;
        }

        .navbar {
            background: #111a2e;
        }

        .card {
            background: #111a2e;
            border: 1px solid #1f2a44;
        }

        .table {
            color: #e6e6e6;
        }

        .table thead {
            color: #9fb3c8;
        }

        .metric {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .small-text {
            color: #9fb3c8;
            font-size: 0.9rem;
        }

        .glow {
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.2);
        }

        /* FIX: proper badge styling */
        .badge-buy {
            background: #00c853 !important;
            color: white;
        }

        .badge-sell {
            background: #ff1744 !important;
            color: white;
        }

        .badge-hold {
            background: #ffd600 !important;
            color: black;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand mb-0 h1">📊 Market Intelligence Dashboard</span>
    <span class="text-secondary">Live Signals (auto-refresh every 10s)</span>
</nav>

<div class="container mt-4">

    <!-- TOP METRICS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3 glow">
                <div class="small-text">Market Mode</div>
                <div class="metric">Sentiment Engine</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 glow">
                <div class="small-text">Update Frequency</div>
                <div class="metric">10 Seconds</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 glow">
                <div class="small-text">Signal Types</div>
                <div class="metric">BUY / SELL / HOLD</div>
            </div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card p-3 glow">
        <h5 class="mb-3">Live Signals</h5>

        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Signal</th>
                    <th>Score</th>
                    <th>Confidence</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>

<!-- SCRIPT -->
<script>

function getBadge(signal) {
    if (signal === "BUY") return "badge-buy";
    if (signal === "SELL") return "badge-sell";
    return "badge-hold";
}

async function fetchData() {
    try {
        const res = await fetch("/signals");
        const data = await res.json();

        const table = document.getElementById("table");
        table.innerHTML = "";

        for (let ticker in data) {
            const row = data[ticker];

            // SAFE fallback (prevents crash)
            const score = row.score ?? 0;
            const confidence = row.confidence ?? 0;

            table.innerHTML += `
                <tr>
                    <td><strong>${ticker}</strong></td>
                    <td>
                        <span class="badge ${getBadge(row.signal)}">
                            ${row.signal}
                        </span>
                    </td>
                    <td>${score.toFixed(2)}</td>
                    <td>${confidence.toFixed(2)}</td>
                </tr>
            `;
        }

    } catch (err) {
        console.error("Failed to fetch signals:", err);
    }
}

// initial load
fetchData();

// auto refresh
setInterval(fetchData, 10000);

</script>

</body>
</html>
