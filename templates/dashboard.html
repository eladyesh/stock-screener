<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Intelligence Terminal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --bg: #0e1626;
    --panel: #172235;
    --panel2: #1c2a42;

    --text: #f1f5f9;
    --muted: #cbd5e1;

    --green: #2ee59d;
    --red: #ff5c75;
    --yellow: #ffd166;

    --border: rgba(255,255,255,0.08);
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui;
}

/* NAV */
.navbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
}

/* CARDS */
.card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
}

.card:hover {
    background: var(--panel2);
    transition: 0.2s;
}

/* BADGES */
.badge {
    padding: 6px 10px;
    border-radius: 999px;
    font-weight: 600;
}

.buy { background: rgba(46,229,157,0.15); color: var(--green); }
.sell { background: rgba(255,92,117,0.15); color: var(--red); }
.hold { background: rgba(255,209,102,0.15); color: var(--yellow); }

/* TICKER CARD */
.ticker {
    transition: 0.2s;
}

.flash-buy { animation: flashG 1s; }
.flash-sell { animation: flashR 1s; }

@keyframes flashG {
    0% { background: rgba(46,229,157,0.25); }
    100% { background: transparent; }
}

@keyframes flashR {
    0% { background: rgba(255,92,117,0.25); }
    100% { background: transparent; }
}

/* HEATMAP */
.heatmap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.heatbox {
    width: 90px;
    padding: 8px;
    border-radius: 10px;
    text-align: center;
    font-size: 12px;
}

h5, h6 {
    color: var(--text);
}

.small {
    color: var(--muted);
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">📊 Trading Intelligence Terminal</span>
    <span class="small">Live polling system</span>
</nav>

<div class="container mt-4">

<!-- SENTIMENT -->
<div class="card p-3 mb-3">
    <h6>Market Sentiment</h6>
    <div id="sentiment" class="fs-5">Loading...</div>
</div>

<!-- HEATMAP -->
<div class="card p-3 mb-3">
    <h6>Heatmap</h6>
    <div class="heatmap" id="heatmap"></div>
</div>

<!-- EXPLANATION -->
<div class="card p-3 mb-3">
    <h6>Signal Logic</h6>
    <div class="small">
        BUY = positive news/events<br>
        SELL = risk/legal negative events<br>
        HOLD = neutral mixed signals
    </div>
</div>

<!-- GRID -->
<div class="row" id="grid"></div>

<!-- HISTORY -->
<div class="card p-3 mt-3">
    <h6>Update Log</h6>
    <div id="history"></div>
</div>

</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast text-bg-dark border-0">
        <div class="toast-body" id="toastMsg"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let last = {};
let history = [];

function badge(signal) {
    if (signal === "BUY") return "buy";
    if (signal === "SELL") return "sell";
    return "hold";
}

function flash(oldS, newS) {
    if (!oldS) return "";
    if (oldS !== newS) {
        if (newS === "BUY") return "flash-buy";
        if (newS === "SELL") return "flash-sell";
    }
    return "";
}

function toast(msg) {
    document.getElementById("toastMsg").innerText = msg;
    new bootstrap.Toast(document.getElementById("toast")).show();
}

async function load() {
    const res = await fetch("/signals");
    const data = await res.json();

    const grid = document.getElementById("grid");
    const heatmap = document.getElementById("heatmap");

    grid.innerHTML = "";
    heatmap.innerHTML = "";

    let buy = 0, sell = 0, hold = 0;

    for (let t in data) {
        const d = data[t];

        if (d.signal === "BUY") buy++;
        else if (d.signal === "SELL") sell++;
        else hold++;

        const f = flash(last[t], d.signal);

        grid.innerHTML += `
        <div class="col-md-3 mb-3">
            <div class="card p-3 ticker ${f}">
                <h5>${t}</h5>
                <span class="badge ${badge(d.signal)}">${d.signal}</span>
                <div class="small mt-2">Score: ${d.score.toFixed(2)}</div>
                <div class="small">Conf: ${d.confidence.toFixed(2)}</div>
            </div>
        </div>
        `;

        heatmap.innerHTML += `
            <div class="heatbox ${badge(d.signal)}">
                ${t}<br>${d.signal}
            </div>
        `;

        if (last[t] && last[t] !== d.signal) {
            if (d.signal === "BUY") toast("🚀 BUY: " + t);
            if (d.signal === "SELL") toast("⚠ SELL: " + t);
        }

        last[t] = d.signal;
    }

    document.getElementById("sentiment").innerText =
        `BUY: ${buy} | SELL: ${sell} | HOLD: ${hold}`;

    history.unshift(new Date().toLocaleTimeString() + " updated");

    if (history.length > 8) history.pop();

    document.getElementById("history").innerHTML =
        history.map(h => `<div class="small">${h}</div>`).join("");
}

load();
setInterval(load, 10000);

</script>

</body>
</html>
