<!DOCTYPE html>
<html>
<head>
    <title>Investor Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0b1220;
            --card: #111a2e;
            --muted: #94a3b8;
            --green: #22c55e;
            --red: #fb7185;
            --border: #1f2a44;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            background: var(--bg);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 20px;
            font-size: 13px;
        }

        /* PANEL */
        .panel {
            background: var(--card);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        label {
            font-size: 12px;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0e1628;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--green);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: var(--green);
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* LOADING */
        .loading {
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
            display: none;
        }

        /* CARDS */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #2b3a5f;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .symbol {
            font-size: 16px;
            font-weight: 600;
        }

        .score {
            font-size: 14px;
            font-weight: 700;
        }

        .green {
            color: var(--green);
        }

        .red {
            color: var(--red);
        }

        .meta {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        /* RESPONSIVE */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📊 Investor Scanner</h1>
    <div class="subtitle">
        Long-term quality investing engine (growth + fundamentals + stability)
    </div>

    <!-- INPUT PANEL -->
    <div class="panel">

        <div class="grid">

            <div>
                <label>Min Score</label>
                <input id="min_score" type="number" value="0">
            </div>

            <div>
                <label>Max P/E</label>
                <input id="max_pe" type="number" value="30">
            </div>

            <div>
                <label>Min Revenue Growth</label>
                <input id="min_growth" type="number" value="0">
            </div>

        </div>

        <button onclick="scan()">Run Scan</button>

        <div id="loading" class="loading">Scanning market...</div>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

</div>

<script>
async function scan() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("results").innerHTML = "";

    const payload = {
        min_score: document.getElementById("min_score").value,
        max_pe: document.getElementById("max_pe").value,
        min_growth: document.getElementById("min_growth").value
    };

    try {
        const res = await fetch("/scan", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        render(data);

    } catch (e) {
        document.getElementById("results").innerHTML =
            "<p style='color:#fb7185'>Failed to load data</p>";
    }

    document.getElementById("loading").style.display = "none";
}

function render(data) {
    let html = "";

    if (!data.length) {
        html = "<p style='color:#94a3b8'>No results found</p>";
    }

    for (let s of data) {

        const color = s.score > 50 ? "green" : "red";

        html += `
        <div class="card" onclick="window.location='/stock/${s.symbol}'">

            <div class="row">
                <div class="symbol">${s.symbol}</div>
                <div class="score ${color}">
                    ${s.score.toFixed(1)}
                </div>
            </div>

            <div class="meta">
                Growth: ${(s.price_growth * 100).toFixed(1)}% |
                P/E: ${s.pe ?? "N/A"} |
                Rev: ${s.revenue_growth ?? "N/A"}
            </div>

        </div>
        `;
    }

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
